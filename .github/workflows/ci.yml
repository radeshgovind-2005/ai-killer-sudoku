name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (lint)
        run: ruff check src/python/

      - name: Run ruff (format check)
        run: ruff format --check src/python/

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: pytest tests/python/ --cov=src/python --cov-report=xml -v || echo "No tests yet"

  test-prolog:
    name: Prolog Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SWI-Prolog
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y swi-prolog

      - name: Run Prolog tests
        run: |
          if compgen -G "src/prolog/*.pl" > /dev/null; then
            swipl -g "halt(0)" -t halt src/prolog/*.pl
          else
            echo "No Prolog source files yet — skipping"
          fi
